        buttonText: 'Підписатись'
        placeholder: 'Введіть Ваш email'
        disclaimer: 'Ми шануємо Вашу приватність. Ви можете відписатись будь-коли.'

build:
  writeStats: true
  buildStats:
    enable: true
  cachebusters:
    - source: "assets/notwatching/hugo_stats\\.json"
      target: 'css'
    - source: "(postcss|tailwind)\\.config\\.js"
      target: 'css'

module:
  hugoVersion:
    extended: true
    min: '0.80.0'
  mounts:
    - source: 'assets'
      target: 'assets'
    - disableWatch: true
      source: 'hugo_stats.json'
      target: 'assets/notwatching/hugo_stats.json'

markup:
  highlight:
    noClasses: false
    lineNos: true
    codeFences: true
    guessSyntax: true
    lineNumbersInTable: true
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2

caches:
  images:
    dir: ':cacheDir/images'
