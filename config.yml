enableGitInfo: true

taxonomies:
  category: 'categories'
  tag: 'tags'

pagination:
  pageSize: 6
  paginatePath: 'page'

params:
  author: 'DentalStudio'
  description: 'Стоматологічна клініка в Києві — лікування зубів, протезування, відбілювання'

  google_maps_api_key: 'AIzaSyBp3MaMPsKbRNyxGpW99wzLgwaqOV37ILw'

  address: 'м. Київ, вул. Бульварно-Кудрявська, 29е'
  phones:
    - '+38 (044) 234-56-78'
  email: 'info@dentalstudio.kiev.ua'
  working_hours: 'Пн-Пт: 9:00–18:00, Сб-Нд: за попереднім записом'
  license: 'АВ №565904 від 02.09.2010'
  legal_entity: 'ПП "ДенталСтудио"'

  cert: 'images/certificates'

  cta:
    enable: true
    title: 'Запишіться на консультацію'
    description: 'Наші лікарі допоможуть вирішити будь-які стоматологічні проблеми.'
    gradient_from: '#2563eb'
    gradient_to: '#7c3aed'
    gradient_angle: 30
    primary_button:
      text: 'Записатися'
      url: '/kontakti/'

  social:
    facebook: 'https://www.facebook.com/Dental-Studio-158999034629525'

  footer:
    column_1_title: 'Клініка'
    column_2_title: 'Послуги'
    column_3_title: 'Інформація'

  blog:
    enable: false

build:
  writeStats: true
  buildStats:
    enable: true
  cachebusters:
    - source: "assets/notwatching/hugo_stats\\.json"
      target: 'css'
    - source: "(postcss|tailwind)\\.config\\.js"
      target: 'css'

module:
  hugoVersion:
    extended: true
    min: '0.80.0'
  mounts:
    - source: 'assets'
      target: 'assets'
    - disableWatch: true
      source: 'hugo_stats.json'
      target: 'assets/notwatching/hugo_stats.json'

markup:
  highlight:
    noClasses: false
    lineNos: true
    codeFences: true
    guessSyntax: true
    lineNumbersInTable: true
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    endLevel: 3
    ordered: false
    startLevel: 2

caches:
  images:
    dir: ':cacheDir/images'
