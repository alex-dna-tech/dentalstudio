<a
  href="{{ .RelPermalink }}"
  class="card block group"
  style="background-color: {{ with .Params.category_color }}{{ . }}{{ else }}#ffffff{{ end }};">
  <div class="text-4xl mb-4">{{ with .Params.emoji }}{{ . }}{{ end }}</div>
  <div
    class="inline-block px-3 py-1 rounded-full text-sm font-medium mb-3 text-white"
    style="background-color: {{ with .Params.category_badge_color }}{{ . }}{{ else }}#525252{{ end }};">
    {{ .Params.category }}
  </div>
  <h3
    class="text-xl font-bold mb-2 group-hover:text-primary-600 transition-colors">
    {{ .Title }}
  </h3>
  <p class="text-gray-600 mb-4 line-clamp-2">{{ .Description }}</p>
  <span
    class="inline-flex items-center text-primary-600 font-medium group-hover:underline">
    Докладніше
    <svg
      class="w-4 h-4 ml-1"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M14 5l7 7m0 0l-7 7m7-7H3" />
    </svg>
  </span>
</a>
