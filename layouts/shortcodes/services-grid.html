{{/* Services Grid Shortcode — shows cards from /shho-mi-mozhemo/ */}}

{{ $services := .Site.GetPage "/shho-mi-mozhemo" }}

<div class="feature-grid">
  {{ range first $limit $services.Pages.ByWeight }}

  {{ end }}
</div>

  <a href="/shho-mi-mozhemo/" class="btn-primary">Всі послуги →</a>
</div>
